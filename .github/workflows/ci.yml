name: CI-CD Pipeline

on:
  push:
    branches:
      - dev
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  docker-build:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/nodejs-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/nodejs-app:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/nodejs-app:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nodejs-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nodejs-app:latest

  deploy-staging:
    if: github.ref == 'refs/heads/dev'
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Staging
        run: echo "Deploying to STAGING environment"

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Production
        run: echo "Deploying to PRODUCTION environment"